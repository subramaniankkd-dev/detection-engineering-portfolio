title: PowerShell EncodedCommand Execution
id: a1b2c3d4-0003-4f00-9a03-pwshencoded0003
status: experimental
description: Detects PowerShell launched with a base64-encoded command, a common
  obfuscation technique used by attackers to hide malicious payloads.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
author: Subramanian Karthick
date: 2026/05/30
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense-evasion
  - attack.t1027
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_flag:
    CommandLine|contains:
      - ' -enc '
      - ' -EncodedCommand '
      - ' -e '
  condition: selection_img and selection_flag
falsepositives:
  - Legitimate administrative or deployment scripts using encoded commands
level: medium
