title: Potential Linux Reverse Shell via Common Interpreters
id: a1b2c3d4-0005-4f00-9a05-linuxrevshell05
status: experimental
description: Detects shell or interpreter processes redirecting input/output to a
  network socket (/dev/tcp), a hallmark of interactive reverse shells.
references:
  - https://attack.mitre.org/techniques/T1059/004/
author: Subramanian Karthick
date: 2026/05/30
tags:
  - attack.execution
  - attack.t1059.004
logsource:
  product: linux
  category: process_creation
detection:
  selection_tcp:
    CommandLine|contains:
      - '/dev/tcp/'
      - '/dev/udp/'
  selection_tools:
    CommandLine|contains|all:
      - 'sh -i'
  selection_nc:
    Image|endswith:
      - '/nc'
      - '/ncat'
    CommandLine|contains:
      - ' -e '
      - ' --exec'
  condition: selection_tcp or selection_tools or selection_nc
falsepositives:
  - Administrative scripts using bash networking redirection
level: high
